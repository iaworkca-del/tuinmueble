<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión — {{ branding.nombre_agencia if branding else "Mi Propiedad" }}</title>
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--azul) 0%, var(--azul-medio) 100%);
      padding: 1rem;
    }
    .login-card {
      background: #fff;
      border-radius: 14px;
      padding: 2.5rem 2.2rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    }
    .login-card h1 {
      color: var(--azul);
      font-size: 1.4rem;
      margin-bottom: 0.3rem;
      text-align: center;
    }
    .login-card p.sub {
      text-align: center;
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 1.8rem;
    }
    .login-card label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #444;
      margin-bottom: 0.3rem;
      margin-top: 1rem;
    }
    .login-card input {
      width: 100%;
      padding: 0.7rem 0.9rem;
      border: 1px solid var(--gris);
      border-radius: 8px;
      font-size: 0.95rem;
    }
    .login-error {
      background: #fdecea;
      color: #c0392b;
      padding: 0.7rem 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      text-align: center;
    }
    .login-volver {
      display: block;
      text-align: center;
      margin-top: 1.4rem;
      font-size: 0.85rem;
      color: #888;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <h1>{{ branding.nombre_agencia if branding else "Mi Propiedad" }}</h1>
      <p class="sub">Acceso exclusivo para agentes</p>

      {% if error %}
      <div class="login-error">{{ error }}</div>
      {% endif %}

      <form action="/login" method="post">
        <input type="hidden" name="siguiente" value="{{ siguiente }}" />
        <label for="usuario">Usuario</label>
        <input type="text" name="usuario" id="usuario" required autofocus />
        <label for="password">Contraseña</label>
        <input type="password" name="password" id="password" required />
        <button type="submit" class="btn-primary" style="margin-top:1.6rem;">Ingresar</button>
      </form>
      <a href="/" class="login-volver">← Volver al sitio público</a>
    </div>
  </div>
</body>
</html>

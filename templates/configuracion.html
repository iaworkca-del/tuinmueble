<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Configuración — Mi Propiedad</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<header>
  <div>
    <div class="logo-text">{{ branding.nombre_agencia }}</div>
    <p>Configuración de marca</p>
  </div>
</header>

<div class="container">

  {% if guardado %}
  <div class="card" style="border-left:4px solid #27ae60;">
    ✅ Configuración guardada correctamente.
  </div>
  {% endif %}

  <form action="/configuracion" method="post" enctype="multipart/form-data">

    <div class="card">
      <h2>Marca de la agencia</h2>
      <div class="form-grid">
        <div class="form-group full">
          <label for="nombre_agencia">Nombre de la agencia</label>
          <input type="text" name="nombre_agencia" id="nombre_agencia"
                 value="{{ branding.nombre_agencia }}" required />
        </div>
        <div class="form-group">
          <label for="color_primario">Color primario</label>
          <input type="color" name="color_primario" id="color_primario"
                 value="{{ branding.color_primario }}" style="height:48px; padding:4px;" />
        </div>
        <div class="form-group">
          <label for="color_secundario">Color secundario (acentos)</label>
          <input type="color" name="color_secundario" id="color_secundario"
                 value="{{ branding.color_secundario }}" style="height:48px; padding:4px;" />
        </div>
        <div class="form-group full">
          <label>Logo de la agencia (PNG con fondo transparente)</label>
          <label class="file-label" for="logo">
            <span>Clic para subir tu logo</span>
            <small>Se usará en las imágenes y el PDF</small>
          </label>
          <input type="file" name="logo" id="logo" accept="image/png,image/*" />
          <div class="file-name" id="logo-name"></div>
          {% if logo_existe %}
          <div style="margin-top:0.6rem;">
            <span style="font-size:0.85rem; color:#666;">Logo actual:</span><br/>
            <img src="/static/logo.png?v={{ cache_bust }}" alt="Logo actual"
                 style="max-height:70px; margin-top:0.4rem; background:#1a3a5c; padding:8px; border-radius:6px;" />
          </div>
          {% endif %}
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Datos de contacto por defecto</h2>
      <p style="font-size:0.85rem; color:#888; margin-bottom:0.8rem;">
        Se usarán para pre-rellenar el formulario de cada propiedad.
      </p>
      <div class="form-grid">
        <div class="form-group full">
          <label for="nombre_agente">Nombre del agente</label>
          <input type="text" name="nombre_agente" id="nombre_agente"
                 value="{{ branding.nombre_agente }}" />
        </div>
        <div class="form-group">
          <label for="telefono_agente">Teléfono / WhatsApp</label>
          <input type="tel" name="telefono_agente" id="telefono_agente"
                 value="{{ branding.telefono_agente }}" />
        </div>
        <div class="form-group">
          <label for="email_agente">Correo electrónico</label>
          <input type="email" name="email_agente" id="email_agente"
                 value="{{ branding.email_agente }}" />
        </div>
      </div>
    </div>

    <div style="display:flex; gap:0.6rem;">
      <button type="submit" class="btn-primary" style="flex:1;">💾 Guardar configuración</button>
      <a href="/" class="btn-secondary" style="display:flex; align-items:center; padding:0 1.5rem;">Volver</a>
    </div>
  </form>
</div>

<script>
  document.getElementById('logo').addEventListener('change', function () {
    document.getElementById('logo-name').textContent = this.files[0] ? this.files[0].name : '';
  });
</script>

</body>
</html>
